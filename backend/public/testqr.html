<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; connect-src 'self'; img-src 'self' data: https:; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; font-src 'self' https://cdnjs.cloudflare.com https://fonts.gstatic.com;">
    <title>รายละเอียดอุปกรณ์</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* 🎨 ปรับปรุงพื้นฐานให้เหมาะกับมือถือ */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 15px;
            line-height: 1.6;
            background-color: #f0f2f5;
            color: #333;
        }

        /* 📱 Card ปรับขนาดตามหน้าจออัตโนมัติ */
        .card {
            border: none;
            padding: 20px;
            border-radius: 15px;
            width: 100%;
            max-width: 500px;
            background: white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin: 10px auto;
        }

        .back-link {
            margin-bottom: 20px;
        }

        .back-link a {
            text-decoration: none;
            color: #555;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
        }

        h2 {
            color: #1a73e8;
            margin-bottom: 15px;
            font-size: 1.5rem;
            text-align: center;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        .info-label {
            font-weight: bold;
            color: #666;
        }

        img {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            margin: 20px 0;
            border-radius: 10px;
            background: #fafafa;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            color: white;
        }

        /* 🔘 ปุ่มยืมแบบเต็มหน้าจอ กดง่ายด้วยนิ้วโป้ง */
        .btn-borrow {
            background: linear-gradient(135deg, #28a745 0%, #218838 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            font-size: 18px;
            margin-top: 25px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(40, 167, 69, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-borrow:disabled {
            background: #ccc;
            box-shadow: none;
        }

        /* ปุ่มคืน */
        .btn-return {
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            font-size: 18px;
            margin-top: 10px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0, 123, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-return:disabled {
            background: #ccc;
            box-shadow: none;
        }

        /* ปรับแต่ง SweetAlert ให้เหมาะกับมือถือ */
        .swal2-input,
        .swal2-textarea {
            font-size: 16px !important;
        }

        /* ป้องกัน iOS ซูมหน้าจอเมื่อคลิก */
    </style>
</head>

<body>
    <div class="card">
        <div id="content">
            <p style="text-align:center;">กำลังโหลดข้อมูลอุปกรณ์...</p>
        </div>
    </div>

    <script>
        let currentItemData = null;
        const urlParams = new URLSearchParams(window.location.search);
        const itemId = urlParams.get('id');
        const API_BASE = window.location.origin;


        if (!itemId) {
            document.getElementById('content').innerHTML = `<p class="error">ไม่พบรหัสอุปกรณ์ในลิงก์ (id)</p>`;
        } else if (!/^\d+$/.test(itemId)) {
            document.getElementById('content').innerHTML = `<p class="error">รหัสอุปกรณ์ไม่ถูกต้อง: ${itemId}</p>`;
        } else {
            fetch(`${API_BASE}/items/${itemId}`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('ไม่พบข้อมูลอุปกรณ์');
                    }
                    return response.json();
                })
                .then(data => {
                    currentItemData = data.items ? data.items[0] : data;
                    const item = currentItemData;
                    const isAvailable = item.status === 'Available';

                    document.getElementById('content').innerHTML = `
                        <h2>${item.item_name || 'ไม่ระบุชื่อ'}</h2>
                        
                        <div class="info-row">
                            <span class="info-label">สถานะ</span>
                            <span class="status-badge" style="background:${isAvailable ? '#28a745' : '#dc3545'}">${item.status}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">เลขทรัพย์สิน</span>
                            <span>${item.asset_number || '-'}</span>
                        </div>
                         <div class="info-row">
                            <span class="info-label">สัญญา</span>
                            <span>${item.asset_number || '-'}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Serial Number</span>
                            <span>${item.serial_number || '-'}</span>
                        </div>

                        ${item.image_url
                            ? `<img src="${API_BASE}/uploads/${item.image_url}" alt="รูปอุปกรณ์" onerror="this.src='https://via.placeholder.com/400x300?text=ไม่มีรูปภาพ'">`
                            : '<div style="height:100px; display:flex; align-items:center; justify-content:center; color:#ccc;">ไม่มีรูปภาพประกอบ</div>'}
                        
                        <button class="btn-borrow" onclick="borrowItem('${item.item_id}')" ${!isAvailable ? 'disabled' : ''}>
                            <i class="fas fa-hand-pointer"></i> 
                            ${isAvailable ? 'ยืมอุปกรณ์ชิ้นนี้' : 'อุปกรณ์ถูกยืมอยู่'}
                        </button>

                        <button class="btn-borrow" onclick="repairItem('${item.item_id}')" ${!isAvailable ? 'disabled' : ''}>
                            <i class="fas fa-hand-pointer"></i> 
                            ${isAvailable ? 'นำไปซ่อม' : 'ถูกนำไปซ่อมอยู่'}
                        </button>

                        <button class="btn-return" onclick="returnItem('${item.item_id}')" ${isAvailable ? 'disabled' : ''}>
                            <i class="fas fa-undo"></i> 
                            ${!isAvailable ? 'คืนอุปกรณ์' : 'ไม่สามารถคืนได้ (ว่างอยู่)'}
                        </button>
                    `;
                })
                .catch(err => {
                    document.getElementById('content').innerHTML = `<p class="error">ผิดพลาด: ${err.message}</p>`;
                });
        }

        function borrowItem(id) {
            Swal.fire({
                title: 'ระบุข้อมูลผู้ยืมและหลักฐาน',
                html: `
                    <div style="text-align: left;">
                        <label class="swal2-label">ข้อมูลส่วนตัว</label>
                        <input id="swal-input1" class="swal2-input" placeholder="ชื่อ (First Name)">
                        <input id="swal-input2" class="swal2-input" placeholder="นามสกุล (Last Name)">
                        <input id="swal-input3" class="swal2-input" placeholder="รหัสพนักงาน">
                        <input id="swal-input4" class="swal2-input" placeholder="เบอร์โทรศัพท์">
                        <input id="swal-input5" class="swal2-input" placeholder="สังกัด/แผนก">
                        <textarea id="swal-input6" class="swal2-textarea" placeholder="วัตถุประสงค์การยืม"></textarea>
                        
                        <label class="swal2-label" style="display: block; margin-top: 15px;">แนบหลักฐาน (รูปภาพสภาพเครื่อง/เอกสาร)</label>
                        <input type="file" id="swal-input-file" class="swal2-file" multiple accept="image/*,.pdf,.docx" style="display: block; width: 100%; margin-top: 5px;">
                    </div>
                `,
                showCancelButton: true,
                confirmButtonText: 'ยืนยันการยืม',
                cancelButtonText: 'ยกเลิก',
                focusConfirm: false,
                preConfirm: () => {
                    const firstName = document.getElementById('swal-input1').value;
                    const empCode = document.getElementById('swal-input3').value;

                    if (!firstName || !empCode) {
                        Swal.showValidationMessage('กรุณาระบุชื่อและรหัสพนักงาน');
                        return false;
                    }

                    return {
                        firstName: firstName,
                        lastName: document.getElementById('swal-input2').value,
                        empCode: empCode,
                        phone: document.getElementById('swal-input4').value,
                        dept: document.getElementById('swal-input5').value,
                        purpose: document.getElementById('swal-input6').value,
                        files: document.getElementById('swal-input-file').files
                    }
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    // ใช้ FormData เพื่อส่งไฟล์
                    const formData = new FormData();
                    formData.append('item_id', id);
                    formData.append('first_name', result.value.firstName);
                    formData.append('last_name', result.value.lastName);
                    formData.append('employees_code', result.value.empCode);
                    formData.append('phone_number', result.value.phone);
                    formData.append('affiliation', result.value.dept);
                    formData.append('purpose', result.value.purpose);

                    // เพิ่มไฟล์เข้าไปใน FormData (ชื่อ 'files' ต้องตรงกับ Backend)
                    if (result.value.files.length > 0) {
                        for (let i = 0; i < result.value.files.length; i++) {
                            formData.append('files', result.value.files[i]);
                        }
                    }

                    // แสดง Loading ระหว่างส่ง
                    Swal.fire({
                        title: 'กำลังบันทึก...',
                        allowOutsideClick: false,
                        didOpen: () => { Swal.showLoading(); }
                    });

                    fetch(`${API_BASE}/borrow`, {
                        method: 'POST',
                        body: formData // ส่งเป็น formData แทน JSON
                    })
                        .then(res => res.json())
                        .then(data => {
                            if (data.message && !data.error) {
                                Swal.fire('สำเร็จ!', 'บันทึกการยืมและอัปโหลดหลักฐานเรียบร้อย', 'success')
                                    .then(() => location.reload());
                            } else {
                                Swal.fire('ผิดพลาด', data.error || 'บันทึกล้มเหลว', 'error');
                            }
                        })
                        .catch(err => {
                            Swal.fire('ผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
                        });
                }
            });
        }


        function repairItem(id) {
            // ดึงข้อมูลอุปกรณ์จากตัวแปร global ที่โหลดไว้ตอนเปิดหน้า (currentItemData)
            // เพื่อนำมาใส่ในฟอร์มอัตโนมัติ
            const item = currentItemData || {};


            Swal.fire({
                title: '📋 แจ้งซ่อม / พบปัญหาอุปกรณ์',
                width: '650px',
                html: `
    <div style="text-align: left; font-family: 'Sarabun', sans-serif; color: #333;">
        
        <div style="background: #fdfdfd; padding: 15px; border-radius: 12px; border: 1px solid #e0e0e0; margin-bottom: 20px; box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);">
            <div style="margin-bottom: 12px;">
                <label style="font-weight: bold; font-size: 14px; color: #555;">ยี่ห้อเครื่อง / รุ่น</label>
                <input id="sw-brand" class="swal2-input" style="width: 100%; margin: 5px 0; height: 40px; font-size: 15px;" value="${item.item_name || ''}" placeholder="ระบุยี่ห้อ/รุ่น">
            </div>

            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label style="font-weight: bold; font-size: 12px; color: #666;">Serial Number</label>
                    <input id="sw-sn" class="swal2-input" style="width: 100%; margin: 5px 0; height: 38px; font-size: 13px; text-align: center;" value="${item.serial_number || ''}" placeholder="S/N">
                </div>
                <div style="flex: 1;">
                    <label style="font-weight: bold; font-size: 12px; color: #666;">เลขที่สัญญา</label>
                    <input id="sw-ct" class="swal2-input" style="width: 100%; margin: 5px 0; height: 38px; font-size: 13px; text-align: center;" value="${item.contract_number || ''}" placeholder="contract No.">
                </div>
                <div style="flex: 1;">
                    <label style="font-weight: bold; font-size: 12px; color: #666;">เลขทรัพย์สิน</label>
                    <input id="sw-asset" class="swal2-input" style="width: 100%; margin: 5px 0; height: 38px; font-size: 13px; text-align: center;" value="${item.asset_number || ''}" placeholder="Asset No.">
                </div>
            </div>
        </div>

        <div style="padding: 0 5px;">
            <div style="margin-bottom: 12px;">
                <label style="font-weight: bold; font-size: 14px;">ชื่อผู้แจ้ง / เจ้าของเครื่อง *</label>
                <input id="sw-owner" class="swal2-input" style="width: 100%; margin: 5px 0; height: 40px; font-size: 15px;" placeholder="ระบุชื่อ-นามสกุล">
            </div>

            <div style="display: flex; gap: 15px; margin-bottom: 12px;">
                <div style="flex: 1;">
                    <label style="font-weight: bold; font-size: 14px;">รหัสพนักงาน *</label>
                    <input id="sw-code" class="swal2-input" style="width: 100%; margin: 5px 0; height: 40px; font-size: 15px;" placeholder="รหัสพนักงาน">
                </div>
                <div style="flex: 1;">
                    <label style="font-weight: bold; font-size: 14px;">เบอร์โทรศัพท์</label>
                    <input id="sw-phone" class="swal2-input" style="width: 100%; margin: 5px 0; height: 40px; font-size: 15px;" placeholder="08x-xxxxxxx">
                </div>
            </div>

            <div style="margin-bottom: 15px;">
                <label style="font-weight: bold; font-size: 14px;">สังกัด / แผนก</label>
                <input id="sw-dept" class="swal2-input" style="width: 100%; margin: 5px 0; height: 40px; font-size: 15px;" placeholder="ระบุแผนก">
            </div>

            <div style="margin-bottom: 15px;">
                <label style="font-weight: bold; font-size: 14px; color: #d63384;">อาการที่ชำรุด *</label>
                <textarea id="sw-problem" class="swal2-textarea" style="width: 100%; margin: 5px 0; font-size: 14px; height: 90px; border-radius: 8px;" placeholder="กรุณาระบุรายละเอียดปัญหาที่พบ..."></textarea>
            </div>
            
            <label style="font-weight: bold; font-size: 13px; color: #666;"><i class="fas fa-paperclip"></i> แนบรูปภาพ / หลักฐาน</label>
            <input type="file" id="sw-file" class="swal2-file" style="width: 100%; font-size: 13px; margin-top: 5px; border: none;" multiple accept="image/*,.pdf">
        </div>
    </div>
    `,
                showCancelButton: true,
                confirmButtonText: 'ส่งข้อมูลแจ้งซ่อม',
                cancelButtonText: 'ยกเลิก',
                confirmButtonColor: '#ffc107',
                focusConfirm: false,
                preConfirm: () => {
                    // ดึงค่าจาก HTML ของ Swal
                    const data = {
                        brand: document.getElementById('sw-brand').value,
                        serial_number: document.getElementById('sw-sn').value,
                        contract_number: document.getElementById('sw-ct').value,
                        asset_number: document.getElementById('sw-asset').value,
                        employee_name: document.getElementById('sw-owner').value,
                        employees_code: document.getElementById('sw-code').value,
                        phone_number: document.getElementById('sw-phone').value,
                        affiliation: document.getElementById('sw-dept').value,
                        problem: document.getElementById('sw-problem').value,
                        files: document.getElementById('sw-file').files
                    };

                    // ตรวจสอบข้อมูลที่จำเป็น (Validation)
                    if (!data.employee_name || !data.employees_code || !data.problem) {
                        Swal.showValidationMessage('กรุณากรอกชื่อ, รหัสพนักงาน และอาการชำรุด');
                        return false;
                    }
                    return data;
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    const formData = new FormData();

                    // วนลูปเพิ่มข้อมูลตัวอักษรลงใน FormData
                    Object.keys(result.value).forEach(key => {
                        if (key !== 'files') {
                            formData.append(key, result.value[key]);
                        }
                    });

                    // เพิ่ม item_id เข้าไปด้วย
                    formData.append('item_id', id);

                    // เพิ่มไฟล์รูปภาพ/เอกสาร (กรณีมีการเลือกไฟล์)
                    const files = result.value.files;
                    if (files.length > 0) {
                        for (let i = 0; i < files.length; i++) {
                            formData.append('files', files[i]); // ชื่อ 'files' ต้องตรงกับ Backend
                        }
                    }

                    // แสดง Loading
                    Swal.fire({
                        title: 'กำลังส่งข้อมูล...',
                        allowOutsideClick: false,
                        didOpen: () => { Swal.showLoading(); }
                    });

                    // ส่งข้อมูลไปยัง API
                    fetch(`${API_BASE}/api/repair`, {
                        method: 'POST',
                        body: formData // ส่งเป็น FormData (ห้ามตั้ง Headers เป็น JSON)
                    })
                        .then(res => res.json())
                        .then(data => {
                            if (data.success) {
                                Swal.fire({
                                    icon: 'success',
                                    title: 'สำเร็จ!',
                                    text: 'บันทึกการแจ้งซ่อมเรียบร้อยแล้ว',
                                    confirmButtonText: 'ตกลง'
                                }).then(() => location.reload());
                            } else {
                                Swal.fire('ล้มเหลว', data.message || 'ไม่สามารถบันทึกข้อมูลได้', 'error');
                            }
                        })
                        .catch(err => {
                            console.error("Fetch Error:", err);
                            Swal.fire('ผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
                        });
                }
            });
        }



        function returnItem(id) {
            // ดึงข้อมูลการยืมที่ยังไม่ได้คืน
            fetch(`${API_BASE}/borrowing-active`)
                .then(res => res.json())
                .then(logs => {
                    // หาการยืมสำหรับ item นี้
                    const borrowLog = logs.find(log => log.item_id == id);

                    if (!borrowLog) {
                        Swal.fire('ผิดพลาด', 'ไม่พบรายการยืมสำหรับอุปกรณ์นี้', 'error');
                        return;
                    }

                    Swal.fire({
                        title: 'ยืนยันการคืนอุปกรณ์',
                        html: `
                            <div style="text-align: left; background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 15px;">
                                <p><strong>รายละเอียดการยืม:</strong></p>
                                <p>ผู้ยืม: ${borrowLog.first_name} ${borrowLog.last_name}</p>
                                <p>วันยืม: ${new Date(borrowLog.borrow_date).toLocaleDateString('th-TH')}</p>
                                <p>Log ID: ${borrowLog.log_id}</p>
                            </div>
                            <p>โปรดยืนยันการคืนอุปกรณ์</p>
                        `,
                        showCancelButton: true,
                        confirmButtonText: 'ยืนยันการคืน',
                        cancelButtonText: 'ยกเลิก',
                        confirmButtonColor: '#0056b3',
                        cancelButtonColor: '#6c757d'
                    }).then((result) => {
                        if (result.isConfirmed) {
                            // แสดง Loading
                            Swal.fire({
                                title: 'กำลังบันทึก...',
                                allowOutsideClick: false,
                                didOpen: () => { Swal.showLoading(); }
                            });

                            // ส่ง POST ไปที่ /return
                            fetch(`${API_BASE}/return`, {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify({
                                    log_id: borrowLog.log_id,
                                    item_id: id
                                })
                            })
                                .then(res => res.json())
                                .then(data => {
                                    if (data.message) {
                                        Swal.fire('สำเร็จ!', 'คืนอุปกรณ์เรียบร้อย', 'success')
                                            .then(() => location.reload());
                                    } else {
                                        Swal.fire('ผิดพลาด', data.error || 'บันทึกล้มเหลว', 'error');
                                    }
                                })
                                .catch(err => {
                                    Swal.fire('ผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้: ' + err.message, 'error');
                                });
                        }
                    });
                })
                .catch(err => {
                    Swal.fire('ผิดพลาด', 'ไม่สามารถดึงข้อมูลการยืมได้: ' + err.message, 'error');
                });
        }
    </script>
</body>

</html>
