<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายการส่งซ่อม - ระบบยืมคืน</title>
    <link rel="stylesheet" href="../vendor/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #e0b53f 0%, #ff6a00 100%);
            min-height: 100vh;
            padding: 20px 0;
            font-family: 'Sarabun', sans-serif;
        }

        .container-custom {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            padding: 30px;
            margin: auto;
            max-width: 95%;
        }

        .header {
            margin-bottom: 30px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-card {
            background: linear-gradient(135deg, #e0b53f 0%, #ff6a00 100%);
            /* สีแดง/ส้ม สำหรับงานซ่อม */
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <div class="container-custom">
        <div class="header">
            <h1 class="h3"><i class="fas fa-tools me-2"></i> อุปกรณ์ที่กำลังนำไปซ่อม</h1>
            <a href="index.html" class="btn btn-secondary">
                <i class="fas fa-arrow-left me-1"></i> กลับหน้าหลัก
            </a>
        </div>

        <div class="row mb-4">
            <div class="col-md-3">
                <div class="stat-card">
                    <i class="fas fa-hammer mb-2 fa-2x"></i>
                    <div class="h2 font-weight-bold" id="archive-total-count">0</div>
                    <div class="small">รายการที่ปิดงานแล้ว</div>
                </div>
            </div>
            <div class="col-md-9">
                <input type="text" id="search-input" class="form-control form-control-lg mb-3"
                    placeholder="🔍 ค้นหาจากตาราง item_repair..." oninput="searchRepairItems()">
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover" id="repairTable">
                <thead style="background-color: #667eea; color: white;">
                    <tr>
                        <th>ลำดับ</th>
                        <th>ชื่ออุปกรณ์</th>
                        <th>Brand/รุ่น</th>
                        <th>ชื่อเจ้าของ</th>
                        <th>หน่วยงาน</th>
                        <th>รหัสพนักงาน</th>
                        <th>Serial Number</th>
                        <th>เลขสัญญา</th>
                        <th class="text-center">ลายละเอียด</th>
                    </tr>
                </thead>
                <tbody id="repair-list">
                </tbody>
            </table>
        </div>
    </div>

    <div style="display: none;">
        <span id="usernameDisplay"></span>
        <h2 id="total-items">0</h2>
        <input type="text" id="inventory-search">
        <div id="inventory-list"></div>
        <div id="pagination-container"></div>
    </div>

    <script src="../vendor/bootstrap.bundle.min.js"></script>
    <script src="../vendor/sweetalert2.all.min.js"></script>
    <script src="admin-script.js"></script>

   <script>
    const CONFIG = { API_BASE: window.location.origin };

    // 1. โหลดข้อมูลจาก API: /api/repair-items (จากตาราง item_repair)
    async function loadRepairItems() {
        try {
            const response = await fetch(`${CONFIG.API_BASE}/api/repair-items`);
            const result = await response.json();
            
            if (result.success) {
                const data = result.data;
                displayRepairTable(data);
            }
        } catch (err) {
            console.error('❌ Error Loading Status:', err);
            document.getElementById('repair-list').innerHTML = `<tr><td colspan="9" class="text-center text-danger">เชื่อมต่อฐานข้อมูลล้มเหลว</td></tr>`;
            document.getElementById('archive-total-count').textContent = '0';
        }
    }

    function refreshVisibleIndex() {
        const rows = Array.from(document.querySelectorAll('#repair-list tr'));
        const visibleRows = rows.filter(row => row.style.display !== 'none');

        visibleRows.forEach((row, index) => {
            const firstCell = row.querySelector('td');
            if (firstCell) firstCell.textContent = index + 1;
        });
    }

    // 2. แสดงผลตาราง
    function displayRepairTable(items) {
        const tbody = document.getElementById('repair-list');
        tbody.innerHTML = '';

        if (items.length === 0) {
            tbody.innerHTML = '<tr><td colspan="9" class="text-center py-5 text-muted">ไม่พบข้อมูลในตาราง item_repair</td></tr>';
            document.getElementById('archive-total-count').textContent = '0';
            return;
        }

        document.getElementById('archive-total-count').textContent = items.length;

        items.forEach((item, index) => {
            const itemData = encodeURIComponent(JSON.stringify(item));
            
            const row = `
                <tr class="align-middle">
                    <td class="text-center">${index + 1}</td>
                    <td>
                        <div class="fw-bold text-dark">${item.item_name || 'ไม่ระบุชื่ออุปกรณ์'}</div>
                        <div class="text-muted small mt-1">Archive ID: ${item.archive_id || '-'}</div>
                        <div class="text-muted small">Repair ID: ${item.repair_id || '-'}</div>
                    </td>
                    <td>${item.brand || '-'}</td>
                    <td>${item.owner_name || item.employee_name || '-'}</td>
                    <td class="text-muted small">${item.affiliation || '-'}</td>
                    <td class="text-center"><code>${item.employee_code || item.employees_code || '-'}</code></td>
                    <td>
                        <div class="text-muted small">S/N: ${item.serial_number || '-'}</div>
                        <div class="small text-danger mt-1 text-truncate" style="max-width: 260px;" title="${item.problem_description || item.problem || '-'}">
                            <i class="fas fa-exclamation-circle me-1"></i>${item.problem_description || item.problem || '-'}
                        </div>
                    </td>
                    <td class="text-muted small">${item.contract_number || '-'}</td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-info text-white shadow-sm px-3" onclick="showRepairDetail('${itemData}')">
                            <i class="fas fa-eye me-1"></i> ติดตาม
                        </button>
                    </td>
                </tr>`;
            tbody.innerHTML += row;
        });

        refreshVisibleIndex();
    }

    // 3. แสดงรายละเอียดจาก item_repair
async function showRepairDetail(encodedData) {
    try {
        const item = JSON.parse(decodeURIComponent(encodedData));
        const archiveDate = item.archived_at
            ? new Date(item.archived_at).toLocaleString('th-TH')
            : '-';
        
        const detailHtml = `
            <div class="text-start" style="font-size: 0.95rem; font-family: 'Sarabun';">
                <div class="mb-2"><b>อุปกรณ์:</b> ${item.item_name || '-'}</div>
                <div class="mb-2 text-muted"><b>Brand/รุ่น:</b> ${item.brand || '-'}</div>
                <hr>
                <div class="row mb-2">
                    <div class="col-4 text-muted">Archive ID:</div>
                    <div class="col-8"><b>${item.archive_id || '-'}</b></div>
                </div>
                <div class="row mb-2">
                    <div class="col-4 text-muted">Repair ID:</div>
                    <div class="col-8">${item.repair_id || '-'}</div>
                </div>
                <div class="row mb-2">
                    <div class="col-4 text-muted">ชื่อเจ้าของ:</div>
                    <div class="col-8">${item.owner_name || item.employee_name || '-'}</div>
                </div>
                <div class="row mb-2">
                    <div class="col-4 text-muted">รหัสพนักงาน:</div>
                    <div class="col-8">${item.employee_code || item.employees_code || '-'}</div>
                </div>
                <div class="row mb-2">
                    <div class="col-4 text-muted">หน่วยงาน:</div>
                    <div class="col-8">${item.affiliation || '-'}</div>
                </div>
                <div class="row mb-2">
                    <div class="col-4 text-muted">Serial Number:</div>
                    <div class="col-8"><code>${item.serial_number || '-'}</code></div>
                </div>
                <div class="row mb-2">
                    <div class="col-4 text-muted">เลขสัญญา:</div>
                    <div class="col-8">${item.contract_number || '-'}</div>
                </div>
                <div class="row mb-2">
                    <div class="col-4 text-muted">Item ID:</div>
                    <div class="col-8">${item.item_id || '-'}</div>
                </div>
                <div class="row mb-2">
                    <div class="col-4 text-muted">วันที่เก็บเข้า:</div>
                    <div class="col-8">${archiveDate}</div>
                </div>
                <hr>
                <div class="p-3 bg-light rounded border-start border-4 border-warning">
                    <div class="fw-bold small text-muted">รายละเอียดซ่อม:</div>
                    <div class="text-danger">${item.problem_description || item.problem || '-'}</div>
                </div>
            </div>
        `;

        Swal.fire({
            title: 'รายละเอียดการซ่อม',
            html: detailHtml,
            confirmButtonText: 'ปิด'
        });
    } catch (err) { console.error(err); }
}

    // 4. ค้นหาในตาราง
    function searchRepairItems() {
        const searchTerm = document.getElementById('search-input').value.toLowerCase();
        const rows = document.querySelectorAll('#repair-list tr');
        rows.forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(searchTerm) ? '' : 'none';
        });
        refreshVisibleIndex();
    }

    document.addEventListener('DOMContentLoaded', loadRepairItems);
</script>

</body>

</html>
