<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายการส่งซ่อม - ระบบยืมคืน</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #e0b53f 0%, #ff6a00 100%);
            min-height: 100vh;
            padding: 20px 0;
            font-family: 'Sarabun', sans-serif;
        }

        .container-custom {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            padding: 30px;
            margin: auto;
            max-width: 95%;
        }

        .header {
            margin-bottom: 30px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-card {
            background: linear-gradient(135deg, #e0b53f 0%, #ff6a00 100%);
            /* สีแดง/ส้ม สำหรับงานซ่อม */
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <div class="container-custom">
        <div class="header">
            <h1 class="h3"><i class="fas fa-tools me-2"></i> อุปกรณ์ที่กำลังนำไปซ่อม</h1>
            <a href="index.html" class="btn btn-secondary">
                <i class="fas fa-arrow-left me-1"></i> กลับหน้าหลัก
            </a>
        </div>

        <div class="row mb-4">
            <div class="col-md-3">
                <div class="stat-card">
                    <i class="fas fa-hammer mb-2 fa-2x"></i>
                    <div class="h2 font-weight-bold" id="repair-count">0</div>
                    <div class="small">รายการที่กำลังซ่อม</div>
                </div>
            </div>
            <div class="col-md-9">
                <input type="text" id="search-input" class="form-control form-control-lg mb-3"
                    placeholder="🔍 ค้นหาอุปกรณ์ที่กำลังซ่อม..." oninput="searchRepairItems()">
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover" id="repairTable">
                <thead style="background-color: #667eea; color: white;">
                    <tr>
                        <th>ลำดับ</th>
                        <th>ชื่ออุปกรณ์</th>
                        <th>Serial Number</th>
                        <th class="text-center">ลายละเอียด</th>
                    </tr>
                </thead>
                <tbody id="repair-list">
                </tbody>
            </table>
        </div>
    </div>

    <div style="display: none;">
        <span id="usernameDisplay"></span>
        <h2 id="total-items">0</h2>
        <input type="text" id="inventory-search">
        <div id="inventory-list"></div>
        <div id="pagination-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="admin-script.js"></script>

   <script>
    const CONFIG = { API_BASE: `http://${window.location.hostname}:5000` };

    // 1. ฟังก์ชันสร้าง Badge สถานะ
    function getStatusBadge(status) {
        switch (status) {
            case 'Pending': 
                return '<span class="badge bg-secondary"><i class="fas fa-clock me-1"></i> รอรับเรื่อง</span>';
            case 'In Progress': 
                return '<span class="badge bg-primary"><i class="fas fa-spinner fa-spin me-1"></i> กำลังซ่อม</span>';
            default: 
                return `<span class="badge bg-info text-white">${status || 'ตรวจสอบสถานะ'}</span>`;
        }
    }

    // 2. โหลดข้อมูลจาก API: /api/repair-status
    async function loadRepairItems() {
        try {
            // เปลี่ยนมาเรียกใช้ API ตัวที่จำกัดสถานะ Pending และ In Progress
            const response = await fetch(`${CONFIG.API_BASE}/api/repair-status`);
            const result = await response.json();
            
            if (result.success) {
                const data = result.data;
                // แสดงจำนวนรายการที่กำลังซ่อมจริงใน Stat Card
                document.getElementById('repair-count').textContent = data.length;
                displayRepairTable(data);
            }
        } catch (err) {
            console.error('❌ Error Loading Status:', err);
            document.getElementById('repair-list').innerHTML = `<tr><td colspan="4" class="text-center text-danger">เชื่อมต่อฐานข้อมูลล้มเหลว</td></tr>`;
        }
    }

    // 3. แสดงผลตาราง
    function displayRepairTable(items) {
        const tbody = document.getElementById('repair-list');
        tbody.innerHTML = '';

        if (items.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="text-center py-5 text-muted">ไม่มีรายการอุปกรณ์ที่อยู่ระหว่างการซ่อม</td></tr>';
            return;
        }

        items.forEach((item, index) => {
            // เก็บข้อมูลดิบไว้ใน attribute เพื่อส่งต่อให้ SweetAlert
            const itemData = encodeURIComponent(JSON.stringify(item));
            
            const row = `
                <tr class="align-middle">
                    <td class="text-center">${index + 1}</td>
                    <td>
                        <div class="fw-bold text-dark">${item.brand || 'ไม่ระบุยี่ห้อ'}</div>
                        <div class="mt-1">${getStatusBadge(item.status)}</div>
                    </td>
                    <td>
                        <div class="text-muted small">S/N: ${item.serial_number || '-'}</div>
                        <div class="text-muted small">Asset: ${item.asset_number || '-'}</div>
                        <div class="small text-danger mt-1">
                            <i class="fas fa-exclamation-circle me-1"></i>${item.problem || 'ไม่ระบุอาการ'}
                        </div>
                    </td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-info text-white shadow-sm px-3" onclick="showRepairDetail('${itemData}')">
                            <i class="fas fa-eye me-1"></i> ติดตาม
                        </button>
                    </td>
                </tr>`;
            tbody.innerHTML += row;
        });
    }

    // 4. แสดงรายละเอียดซ่อม (เรียกดูข้อมูลจาก API ตัวล่าสุด)
    // ในไฟล์ repair.html ส่วน function showRepairDetail
async function showRepairDetail(encodedData) {
    try {
        const item = JSON.parse(decodeURIComponent(encodedData));
        
        const detailHtml = `
            <div class="text-start" style="font-size: 0.95rem; font-family: 'Sarabun';">
                <div class="mb-2"><b>อุปกรณ์:</b> ${item.brand || '-'}</div>
                <hr>
                <div class="row mb-2">
                    <div class="col-4 text-muted">ผู้แจ้งซ่อม:</div>
                    <div class="col-8"><b>${item.employee_name || '-'}</b></div>
                </div>
                <div class="row mb-2">
                    <div class="col-4 text-muted">แผนก:</div>
                    <div class="col-8">${item.department || '-'}</div> </div>
                <div class="row mb-2">
                    <div class="col-4 text-muted">โทร:</div>
                    <div class="col-8">${item.phone || '-'}</div> </div>
                <hr>
                <div class="p-3 bg-light rounded border-start border-4 border-warning">
                    <div class="fw-bold small text-muted">อาการเสีย:</div>
                    <div class="text-danger">${item.problem || '-'}</div>
                </div>
                <div class="mt-3 p-3 bg-white border rounded">
                    <div class="fw-bold small text-muted">สถานะการดำเนินการ:</div>
                    <div class="text-dark">${item.Procedure || 'กำลังตรวจสอบ...'}</div>
                </div>
            </div>
        `;

        Swal.fire({
            title: 'รายละเอียดการซ่อม',
            html: detailHtml,
            confirmButtonText: 'ปิด'
        });
    } catch (err) { console.error(err); }
}

    // 5. ค้นหาในตาราง
    function searchRepairItems() {
        const searchTerm = document.getElementById('search-input').value.toLowerCase();
        const rows = document.querySelectorAll('#repair-list tr');
        rows.forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(searchTerm) ? '' : 'none';
        });
    }

    document.addEventListener('DOMContentLoaded', loadRepairItems);
</script>

</body>

</html>
