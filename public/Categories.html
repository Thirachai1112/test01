<!DOCTYPE html>
<html lang="th">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>รายการอุปกรณ์ | Categories</title>
	<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		:root {
			--ink: #1f2a37;
			--muted: #6b7280;
			--accent: #5c8fb2;
			--accent-dark: #4c7b9b;
			--accent-soft: #e6eff6;
			--teal: #4aa39b;
			--teal-dark: #3f8f88;
			--surface: #ffffff;
			--surface-soft: #f4f7fb;
		}

		body {
			font-family: 'Kanit', sans-serif;
			background: linear-gradient(135deg, #e9eff5 0%, #f7f9fc 100%);
			min-height: 100vh;
			padding: 20px;
			color: var(--ink);
		}

		.container {
			max-width: 1400px;
			margin: 0 auto;
		}

		.header {
			background: rgba(255, 255, 255, 0.98);
			padding: 25px 30px;
			border-radius: 20px;
			box-shadow: 0 10px 30px rgba(31, 42, 55, 0.08);
			margin-bottom: 30px;
			backdrop-filter: blur(8px);
			display: flex;
			justify-content: space-between;
			align-items: center;
			flex-wrap: wrap;
			gap: 20px;
		}

		.header h1 {
			color: var(--ink);
			font-size: 2rem;
			display: flex;
			align-items: center;
			gap: 15px;
		}

		.header h1 i {
			color: var(--accent);
		}

		.btn-back {
			background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
			color: white;
			padding: 12px 25px;
			border: none;
			border-radius: 12px;
			font-size: 1rem;
			cursor: pointer;
			text-decoration: none;
			display: inline-flex;
			align-items: center;
			gap: 8px;
			transition: all 0.3s ease;
		}

		.header-actions {
			display: flex;
			gap: 12px;
			flex-wrap: wrap;
		}

		.btn-borrow {
			background: linear-gradient(135deg, var(--teal) 0%, var(--teal-dark) 100%);
			color: white;
			padding: 12px 25px;
			border: none;
			border-radius: 12px;
			font-size: 1rem;
			cursor: pointer;
			text-decoration: none;
			display: inline-flex;
			align-items: center;
			gap: 8px;
			transition: all 0.3s ease;
		}

		.btn-back:hover,
		.btn-borrow:hover {
			transform: translateY(-2px);
			box-shadow: 0 6px 18px rgba(76, 123, 155, 0.25);
		}

		.search-box {
			background: var(--surface);
			padding: 20px;
			border-radius: 15px;
			box-shadow: 0 5px 16px rgba(31, 42, 55, 0.08);
			margin-bottom: 30px;
			display: flex;
			gap: 15px;
			flex-wrap: wrap;
		}

		.search-input {
			flex: 1;
			min-width: 250px;
			padding: 12px 20px;
			border: 2px solid #dbe3ea;
			border-radius: 10px;
			font-size: 1rem;
			font-family: 'Kanit', sans-serif;
			transition: all 0.3s ease;
		}

		.search-input:focus {
			outline: none;
			border-color: var(--accent);
			box-shadow: 0 0 0 3px rgba(92, 143, 178, 0.15);
		}

		.filter-buttons {
			display: flex;
			gap: 10px;
			flex-wrap: wrap;
		}

		.filter-btn {
			padding: 10px 20px;
			border: 2px solid #dbe3ea;
			background: var(--surface);
			border-radius: 10px;
			cursor: pointer;
			transition: all 0.3s ease;
			font-family: 'Kanit', sans-serif;
			font-size: 0.95rem;
		}

		.filter-btn.active,
		.filter-btn:hover {
			background: var(--accent);
			color: white;
			border-color: var(--accent);
		}

		.stats-bar {
			display: flex;
			gap: 15px;
			margin-bottom: 30px;
			flex-wrap: wrap;
		}

		.stat-card {
			flex: 1;
			min-width: 200px;
			background: linear-gradient(135deg, rgba(255,255,255,0.98) 0%, rgba(244,247,251,0.9) 100%);
			padding: 20px;
			border-radius: 15px;
			box-shadow: 0 5px 16px rgba(31, 42, 55, 0.08);
			text-align: center;
		}

		.stat-card h3 {
			color: var(--accent-dark);
			font-size: 2rem;
			margin-bottom: 5px;
		}

		.stat-card p {
			color: var(--muted);
			font-size: 0.9rem;
		}

		.items-grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
			gap: 25px;
			margin-bottom: 30px;
		}

		.item-card {
			background: var(--surface);
			border-radius: 15px;
			overflow: hidden;
			box-shadow: 0 6px 18px rgba(31, 42, 55, 0.08);
			transition: all 0.3s ease;
			cursor: pointer;
		}

		.item-card:hover {
			transform: translateY(-4px);
			box-shadow: 0 16px 36px rgba(31, 42, 55, 0.12);
		}

		.item-image {
			width: 100%;
			height: 200px;
			object-fit: cover;
			background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
		}

		.item-content {
			padding: 20px;
		}

		.item-title {
			font-size: 1.1rem;
			font-weight: 600;
			color: var(--ink);
			margin-bottom: 10px;
			display: -webkit-box;
			-webkit-line-clamp: 2;
			-webkit-box-orient: vertical;
			overflow: hidden;
		}

		.item-details {
			display: flex;
			flex-direction: column;
			gap: 8px;
			font-size: 0.9rem;
			color: var(--muted);
			margin-bottom: 15px;
		}

		.item-actions {
			margin-top: 14px;
			display: flex;
			justify-content: flex-end;
		}

		.item-borrow-btn {
			border: none;
			border-radius: 10px;
			background: linear-gradient(135deg, var(--teal) 0%, var(--teal-dark) 100%);
			color: #fff;
			padding: 9px 14px;
			font-family: 'Kanit', sans-serif;
			font-size: 0.9rem;
			cursor: pointer;
			display: inline-flex;
			align-items: center;
			gap: 8px;
			transition: all 0.2s ease;
		}

		.item-borrow-btn:hover {
			transform: translateY(-1px);
			box-shadow: 0 8px 18px rgba(63, 143, 136, 0.28);
		}

		.item-borrow-btn.disabled,
		.item-borrow-btn:disabled {
			background: #c8d0d8;
			color: #5f6974;
			cursor: not-allowed;
			box-shadow: none;
			transform: none;
		}

		.item-detail-row {
			display: flex;
			align-items: center;
			gap: 8px;
		}

		.item-detail-row i {
			color: var(--accent);
			width: 20px;
		}

		.status-badge {
			display: inline-block;
			padding: 6px 12px;
			border-radius: 20px;
			font-size: 0.85rem;
			font-weight: 500;
		}

		.status-available {
			background: #e3f2ea;
			color: #1f6b4e;
		}

		.status-borrowed {
			background: #f5e9d6;
			color: #8a6a2f;
		}

		.category-badge {
			background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
			color: white;
			padding: 4px 10px;
			border-radius: 8px;
			font-size: 0.8rem;
			display: inline-block;
			margin-bottom: 10px;
		}

		.empty-state {
			text-align: center;
			padding: 60px 20px;
			background: white;
			border-radius: 15px;
			box-shadow: 0 5px 20px rgba(0,0,0,0.08);
		}

		.empty-state i {
			font-size: 4rem;
			color: #ddd;
			margin-bottom: 20px;
		}

		.empty-state h3 {
			color: #666;
			font-size: 1.3rem;
			margin-bottom: 10px;
		}

		.loading {
			text-align: center;
			padding: 40px;
			color: white;
			font-size: 1.2rem;
		}

		@media (max-width: 768px) {
			.header h1 {
				font-size: 1.5rem;
			}

			.items-grid {
				grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
				gap: 15px;
			}

			.search-box {
				flex-direction: column;
			}

			.search-input {
				width: 100%;
			}
		}

		/* Modal Styles */
		.modal {
			display: none;
			position: fixed;
			z-index: 1000;
			left: 0;
			top: 0;
			width: 100%;
			height: 100%;
			background: rgba(0,0,0,0.7);
			backdrop-filter: blur(5px);
		}

		.modal-content {
			background: white;
			margin: 50px auto;
			padding: 0;
			border-radius: 20px;
			max-width: 600px;
			max-height: 90vh;
			overflow-y: auto;
			box-shadow: 0 20px 60px rgba(0,0,0,0.3);
			animation: slideIn 0.3s ease;
		}

		@keyframes slideIn {
			from {
				transform: translateY(-50px);
				opacity: 0;
			}
			to {
				transform: translateY(0);
				opacity: 1;
			}
		}

		.modal-header {
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			color: white;
			padding: 25px 30px;
			border-radius: 20px 20px 0 0;
			display: flex;
			justify-content: space-between;
			align-items: center;
		}

		.modal-header h2 {
			margin: 0;
			font-size: 1.5rem;
		}

		.close {
			color: white;
			font-size: 2rem;
			font-weight: bold;
			cursor: pointer;
			border: none;
			background: none;
			transition: transform 0.2s;
		}

		.close:hover {
			transform: scale(1.1);
		}

		.modal-body {
			padding: 30px;
		}

		.modal-image {
			width: 100%;
			height: 300px;
			object-fit: contain;
			background: #f8f9fa;
			border-radius: 10px;
			margin-bottom: 20px;
		}

		.modal-details {
			display: flex;
			flex-direction: column;
			gap: 15px;
		}

		.modal-detail-row {
			display: flex;
			border-bottom: 1px solid #f0f0f0;
			padding-bottom: 10px;
		}

		.modal-detail-label {
			font-weight: 600;
			color: #667eea;
			min-width: 150px;
		}

		.modal-detail-value {
			color: #333;
			flex: 1;
		}
	</style>
</head>
<body>

	<div class="container">
		<div class="header">
			<h1>
				<i class="fas fa-box-open"></i>
				รายการอุปกรณ์ทั้งหมด
			</h1>
			<div class="header-actions">
				<a href="borrow.html" class="btn-borrow">
					<i class="fas fa-qrcode"></i>
					ยืมอุปกรณ์
				</a>
				<a href="/Default.html" class="btn-back">
					<i class="fas fa-arrow-left"></i>
					กลับหน้าหลัก
				</a>
			</div>
		</div>

		<div class="search-box">
			<input type="text" class="search-input" id="searchInput" placeholder="🔍 ค้นหาชื่ออุปกรณ์, Serial Number, หมายเลขครัพย์สิน...">
			<div class="filter-buttons">
				<button class="filter-btn active" data-status="all">ทั้งหมด</button>
				<button class="filter-btn" data-status="Available">ว่าง</button>
				<button class="filter-btn" data-status="Borrowed">กำลังยืม</button>
			</div>
		</div>

		<div class="stats-bar">
			<div class="stat-card">
				<h3 id="totalCount">0</h3>
				<p>อุปกรณ์ทั้งหมด</p>
			</div>
			<div class="stat-card">
				<h3 id="availableCount">0</h3>
				<p>ว่าง</p>
			</div>
			<div class="stat-card">
				<h3 id="borrowedCount">0</h3>
				<p>กำลังยืม</p>
			</div>
		</div>

		<div id="itemsContainer" class="loading">
			<i class="fas fa-spinner fa-spin"></i> กำลังโหลดข้อมูล...
		</div>
	</div>

	<!-- Modal -->
	<div id="itemModal" class="modal">
		<div class="modal-content">
			<div class="modal-header">
				<h2 id="modalTitle">รายละเอียดอุปกรณ์</h2>
				<button class="close">&times;</button>
			</div>
			<div class="modal-body" id="modalBody">
				<!-- Content will be loaded here -->
			</div>
		</div>
	</div>

	<script src="Categories-script.js"></script>

</body>
</html>
