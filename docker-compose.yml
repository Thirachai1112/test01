services:
  db:
    image: mysql:8.0
    container_name: mysql_dbeaver
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password123  # รหัสผ่านของ root
      MYSQL_DATABASE: my_database      # ชื่อฐานข้อมูลเริ่มต้น
      MYSQL_USER: user_name            # ชื่อผู้ใช้ทั่วไป
      MYSQL_PASSWORD: user_password    # รหัสผ่านผู้ใช้ทั่วไป
    ports:
      - "3306:3306"                    # Map port ออกมาให้ DBeaver เข้าถึงได้
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    image: node:20-alpine
    container_name: borrow_system_backend
    restart: always
    working_dir: /app/backend
    command: sh -c "npm install && npm start"
    env_file:
      - ./backend/.env.docker
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5001:5000"
    volumes:
      - ./:/app

volumes:
  mysql_data: